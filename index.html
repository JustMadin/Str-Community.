<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STR MODS | مودات ستار</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            /* الألوان الملكية المطلوبة */
            --bg-color: #07070a; 
            --card-bg: #07070c; 
            --main-gold: #d4af37; 
            --border-color: #2d2d10; 
            --text-gray: #b0b0b0;
            --gold-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: var(--bg-color);
            color: white;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-weight: 300;
        }

        /* --- البنر والصورة الشخصية --- */
        .profile-header {
            width: 100%;
            position: relative;
            margin-bottom: 70px;
        }

        .banner {
            width: 100%;
            height: 250px;
            background: linear-gradient(rgba(7, 7, 10, 0.4), rgba(7, 7, 10, 0.8)), url('https://cdn.discordapp.com/banners/1331682748372488243/49d3af0028344ad3f13c6b66bbaf2b40.webp?size=1024') no-repeat center center;
            background-size: cover;
            border-bottom: 2px solid var(--border-color);
            box-shadow: var(--gold-shadow);
        }

        .avatar-container {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--card-bg);
            padding: 4px;
            border: 3px solid var(--main-gold);
            box-shadow: var(--gold-shadow);
            z-index: 5;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .container { 
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px 15px;
            box-sizing: border-box;
        }

        h1 { 
            font-size: 2.2rem; 
            font-weight: 500;
            color: var(--main-gold); 
            text-align: center;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            margin-bottom: 15px;
            margin-top: 20px;
        }

        /* --- مربع الرسالة الترحيبية --- */
        .welcome-box {
            background: rgba(45, 45, 16, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin: 0 auto 30px;
            max-width: 600px;
        }
        .welcome-box p {
            margin: 0;
            color: var(--text-gray);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .welcome-box b { color: var(--main-gold); font-weight: 500; }

        .search-container { position: relative; max-width: 450px; margin: 0 auto 30px; }
        #modSearch { 
            width: 100%; padding: 14px 45px 14px 20px; border-radius: 50px; border: 1px solid var(--border-color); 
            background: var(--card-bg); color: white; outline: none; box-sizing: border-box; 
            transition: 0.3s; font-family: inherit; font-weight: 300;
        }
        #modSearch:focus { border-color: var(--main-gold); box-shadow: var(--gold-shadow); }
        .search-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--main-gold); }

        /* --- التابس --- */
        .tabs-header { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-bottom: 30px; 
        }
        .tab-btn { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            color: white; 
            padding: 12px 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.9rem; 
            transition: 0.3s; 
            flex: 1 1 auto;
            max-width: 150px; 
            justify-content: center;
            font-family: inherit;
        }
        .tab-btn:hover { border-color: var(--main-gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        .tab-btn.active { background: var(--main-gold); border-color: var(--main-gold); color: #07070a; font-weight: 500; box-shadow: var(--gold-shadow); }

        /* نظام الشبكة */
        .tab-content { display: none; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .tab-content.active { display: grid; animation: fadeInOnly 0.4s ease forwards; }

        .mod-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); display: flex; flex-direction: column; height: 100%; transition: 0.3s ease; }
        .mod-card:hover { transform: translateY(-5px); border-color: var(--main-gold); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .mod-image { width: 100%; height: 160px; object-fit: cover; filter: brightness(0.8); transition: 0.3s; }
        .mod-card:hover .mod-image { filter: brightness(1); }
        
        .mod-info { padding: 15px; display: flex; flex-direction: column; flex: 1; }
        .mod-info h3 { margin: 0 0 10px; font-size: 1.1rem; color: #fff; font-weight: 500; }
        .mod-info p { color: var(--text-gray); font-size: 0.85rem; line-height: 1.4; flex-grow: 1; margin-bottom: 15px; }
        
        .mod-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .download-btn { flex: 1; padding: 10px; background: transparent; color: var(--main-gold); text-decoration: none; border-radius: 10px; font-weight: 500; text-align: center; border: 1px solid var(--main-gold); display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.3s; font-family: inherit; }
        .download-btn:hover { background: var(--main-gold); color: #07070a !important; }
        .mod-version { padding: 6px 10px; background: #07070a; border-radius: 8px; font-size: 0.7rem; color: var(--main-gold); border: 1px solid var(--border-color); }

        .hidden { display: none !important; }
        @keyframes fadeInOnly { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 600px) {
            .tab-content { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 5px; }
            .banner { height: 160px; }
            .avatar-container { width: 90px; height: 90px; bottom: -45px; }
            .mod-image { height: 100px; }
            .mod-info h3 { font-size: 0.85rem; }
            .mod-info p { display: none; }
            .mod-footer { flex-direction: column; }
            .download-btn { width: 100%; font-size: 0.75rem; }
            .mod-version { display: none; }
        }
    </style>
</head>
<body>

<div class="profile-header">
    <div class="banner"></div>
    <div class="avatar-container">
        <img src="https://cdn.discordapp.com/icons/1331682748372488243/27cb0faccfbafe63dd4ea954dcc80513.webp?size=1024" alt="Madin">
    </div>
</div>

<div class="container">
    <h1>STR <span style="color:white">MODS</span></h1>

    <div class="welcome-box">
        <p>أهلاً بك في <b>موقع مودات ستار</b>، هنا تجد أفضل مودات ماين كرافت الملكية. استمتع بالتصفح والتحميل!</p>
    </div>

    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="modSearch" placeholder="ابحث عن مود..." onkeyup="filterMods()">
    </div>

    <div class="tabs-header">
        <button class="tab-btn active" onclick="openTab(event, 'pvp')"><i class="fas fa-crosshairs"></i> PVP</button>
        <button class="tab-btn" onclick="openTab(event, 'textures')"><i class="fas fa-paint-brush"></i> Resource</button>
        <button class="tab-btn" onclick="openTab(event, 'survival')"><i class="fas fa-tree"></i> Survival</button>
        <button class="tab-btn" onclick="openTab(event, 'java')"><i class="fas fa-shield-alt"></i> Java</button>
    </div>

    <div id="pvp" class="tab-content active"></div>
    <div id="textures" class="tab-content"></div>
    <div id="survival" class="tab-content"></div>
    <div id="java" class="tab-content"></div>
</div>

<script>
    const myMods = [
        { 
            id: 'textures', 
            name: 'نيوب كومبلينتري', 
            desc: 'جمالية وظلال ومناظر خلابة وجميلة جداً.', 
            link: 'https://www.mediafire.com/file/88ewfuw3jdlb8lc/Newb+Complementary+REIMAGINED+-+Android.mcpack/file', 
            version: '1.26+', 
            image: 'https://i.imgur.com/C1QRBm6.jpeg' 
        },
        { 
            id: 'textures', 
            name: 'الانميشن الواقعي', 
            desc: 'انميشن يضيف واقعية وجمالية لحركة اللاعب.', 
            link: 'https://www.mediafire.com/file/5wd6y59qk8mhmfy/ريسوس+الانميشن.mcpack/file', 
            version: '1.21+', 
            image: 'https://i.imgur.com/Gf3hDYf.jpeg' 
        },
        { 
            id: 'survival', 
            name: 'مود الخريطة', 
            desc: 'جودة عالية، مُحسّن، إنجازات استكشف العالم الان!', 
            link: 'https://www.mediafire.com/file/eyqz18q10j9o2kl/EWM+V2.0.1+-+MC+26.3.mcaddon/file', 
            version: '1.26+', 
            image: 'https://i.imgur.com/OYhf8Go.png' 
        },
        { 
            id: 'survival', 
            name: 'فين ماينر', 
            desc: 'إضافة متطورة لاستخراج العروق وقاطع الأشجار.', 
            link: 'https://www.mediafire.com/file/iqn6azoy8uqodkz/Ore+++Tree_Vein_Miner+v2+Release.mcpack/file', 
            version: '1.21+', 
            image: 'https://i.imgur.com/h8hgkAy.gif' 
        },
        { 
            id: 'survival', 
            name: 'الأثاث الحديث', 
            desc: 'إضافة ديكور تضم أكثر من 750 قطعة عصرية.', 
            link: 'https://www.mediafire.com/file/r28vm52bgcb7af3/Modren+Furniture.mcpack/file', 
            version: 'all', 
            image: 'https://i.imgur.com/woeosOr.jpeg' 
        },
        { 
            id: 'survival', 
            name: 'التحول الى الوحوش', 
            desc: 'اسوار يسمح للاعبين بالتحول إلى عدة وحوش!', 
            link: 'https://www.mediafire.com/file/0eta2tts24ucbc1/Morphing+Bracelet.mcaddon/file', 
            version: '1.26', 
            image: 'https://i.imgur.com/dnmSQwA.png' 
        }
    ];

    function render() {
        document.querySelectorAll('.tab-content').forEach(c => c.innerHTML = "");
        myMods.forEach(m => {
            const container = document.getElementById(m.id);
            if (container) {
                container.innerHTML += `
                    <div class="mod-card">
                        <img src="${m.image}" class="mod-image">
                        <div class="mod-info">
                            <h3>${m.name}</h3>
                            <p>${m.desc}</p>
                            <div class="mod-footer">
                                <a href="${m.link}" target="_blank" class="download-btn">تحميل <i class="fas fa-download"></i></a>
                                <div class="mod-version">${m.version}</div>
                            </div>
                        </div>
                    </div>`;
            }
        });
    }

    function openTab(e, name) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function filterMods() {
        let val = document.getElementById('modSearch').value.toLowerCase();
        document.querySelectorAll('.mod-card').forEach(card => {
            let txt = card.innerText.toLowerCase();
            card.classList.toggle('hidden', !txt.includes(val));
        });
    }

    render();
</script>
</body>
</html>
